<!-- ============================================================
  翼德 · 分镜手绘批注层(把这整段原样嵌进分镜 HTML 的 </body> 之前)
  约定:分镜主体画成一个 <svg id="board" viewBox="0 0 W H">(俯视分镜帧都画在里面)。
  本层自动:在 svg 上覆盖一张透明画布 + 右上角浮动工具条。
           勾哥可直接在分镜上圈画(笔色/粗细/橡皮/撤销/清空)→「导出PNG」
           连分镜带批注存成一张图,贴回翼德当反馈。
  纯 vanilla JS,无依赖;手绘是临时的(不持久化,靠导出 PNG 留存)。
============================================================ -->
<style>
  #yds-stage{position:relative;width:max-content;max-width:100%;line-height:0}
  #yds-stage > svg{position:relative;z-index:1}
  #yds-draw{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;touch-action:none;cursor:crosshair;border-radius:10px}
  #yds-bar{position:fixed;top:10px;right:10px;z-index:2147483600;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
    padding:7px 9px;background:#0f1622;border:1px solid #2a3850;border-radius:10px;
    font:12.5px/1.4 system-ui,"Microsoft YaHei",sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  #yds-bar .pen{width:22px;height:22px;border-radius:50%;border:2px solid #0a0e15;cursor:pointer;box-shadow:0 0 0 1px #2a3850}
  #yds-bar .pen.sel{box-shadow:0 0 0 2px #fff}
  #yds-bar .sz{width:22px;height:22px;border-radius:6px;border:1px solid #2a3850;background:#16202f;color:#8aa0c0;
    cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
  #yds-bar .sz.sel{border-color:#fff;color:#fff}
  #yds-bar .tbtn{padding:5px 10px;border-radius:7px;border:1px solid #2a3850;background:#16202f;color:#e7eefc;font-size:12px;cursor:pointer;font-weight:600}
  #yds-bar .tbtn.on{background:#3a86ff;border-color:#3a86ff;color:#04101f}
  #yds-bar .sep{width:1px;height:20px;background:#2a3850;margin:0 2px}
</style>
<div id="yds-bar">
  <span class="pen sel" data-color="#ff3b3b" style="background:#ff3b3b" title="红"></span>
  <span class="pen" data-color="#ffd23b" style="background:#ffd23b" title="黄"></span>
  <span class="pen" data-color="#39d98a" style="background:#39d98a" title="绿"></span>
  <span class="pen" data-color="#3a86ff" style="background:#3a86ff" title="蓝"></span>
  <span class="pen" data-color="#ffffff" style="background:#ffffff" title="白"></span>
  <span class="sep"></span>
  <span class="sz" data-size="2">细</span><span class="sz sel" data-size="4">中</span><span class="sz" data-size="9">粗</span>
  <span class="sep"></span>
  <button class="tbtn" id="yds-eraser">橡皮</button>
  <button class="tbtn" id="yds-undo">撤销</button>
  <button class="tbtn" id="yds-clear">清空</button>
  <button class="tbtn" id="yds-export" style="background:#39d98a;border-color:#39d98a;color:#04140c">导出PNG</button>
</div>
<script>(function(){
  var svg=document.getElementById('board')||document.querySelector('svg');
  if(!svg){console.warn('[yide 分镜] 没找到 <svg id="board">,手绘层未挂载');return;}
  // 把 svg 套进一个定位 stage,画布盖在上面
  var stage=document.getElementById('yds-stage');
  if(!stage){stage=document.createElement('div');stage.id='yds-stage';svg.parentNode.insertBefore(stage,svg);stage.appendChild(svg);}
  var cv=document.createElement('canvas');cv.id='yds-draw';stage.appendChild(cv);
  var ctx=cv.getContext('2d');
  var color='#ff3b3b',size=4,erasing=false,drawing=false,cur=null,dpr=1,strokes=[];
  function resize(){var r=stage.getBoundingClientRect();dpr=window.devicePixelRatio||1;
    cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);
    cv.style.width=r.width+'px';cv.style.height=r.height+'px';redraw();}
  function redraw(){ctx.setTransform(dpr,0,0,dpr,0,0);var r=cv.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);for(var i=0;i<strokes.length;i++)paint(strokes[i]);}
  function paint(s){if(!s.pts.length)return;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.globalCompositeOperation=s.erase?'destination-out':'source-over';
    ctx.strokeStyle=s.color;ctx.lineWidth=s.erase?s.size*3:s.size;
    ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);
    if(s.pts.length===1)ctx.lineTo(s.pts[0].x+0.1,s.pts[0].y+0.1);
    for(var i=1;i<s.pts.length;i++)ctx.lineTo(s.pts[i].x,s.pts[i].y);
    ctx.stroke();ctx.globalCompositeOperation='source-over';}
  function pos(e){var r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
  cv.addEventListener('pointerdown',function(e){drawing=true;cv.setPointerCapture(e.pointerId);cur={color:color,size:size,erase:erasing,pts:[pos(e)]};strokes.push(cur);redraw();});
  cv.addEventListener('pointermove',function(e){if(!drawing)return;cur.pts.push(pos(e));redraw();});
  function end(){drawing=false;cur=null;}
  cv.addEventListener('pointerup',end);cv.addEventListener('pointercancel',end);cv.addEventListener('pointerleave',function(){if(drawing)end();});
  [].forEach.call(document.querySelectorAll('#yds-bar .pen'),function(p){p.addEventListener('click',function(){
    [].forEach.call(document.querySelectorAll('#yds-bar .pen'),function(x){x.classList.remove('sel')});
    p.classList.add('sel');color=p.dataset.color;erasing=false;document.getElementById('yds-eraser').classList.remove('on');});});
  [].forEach.call(document.querySelectorAll('#yds-bar .sz'),function(b){b.addEventListener('click',function(){
    [].forEach.call(document.querySelectorAll('#yds-bar .sz'),function(x){x.classList.remove('sel')});
    b.classList.add('sel');size=parseFloat(b.dataset.size);});});
  document.getElementById('yds-eraser').addEventListener('click',function(){erasing=!erasing;this.classList.toggle('on',erasing);});
  document.getElementById('yds-undo').addEventListener('click',function(){strokes.pop();redraw();});
  document.getElementById('yds-clear').addEventListener('click',function(){if(confirm('清空所有手绘?')){strokes.length=0;redraw();}});
  document.getElementById('yds-export').addEventListener('click',function(){
    var vb=(svg.getAttribute('viewBox')||'0 0 980 560').split(/\s+/),W=+vb[2]||980,H=+vb[3]||560,scale=2;
    var out=document.createElement('canvas');out.width=W*scale;out.height=H*scale;
    var octx=out.getContext('2d');octx.fillStyle='#0a0e15';octx.fillRect(0,0,out.width,out.height);
    var svgStr=new XMLSerializer().serializeToString(svg);var img=new Image();
    img.onload=function(){octx.drawImage(img,0,0,out.width,out.height);octx.drawImage(cv,0,0,out.width,out.height);
      out.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='分镜_批注.png';a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},1000);},'image/png');};
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  });
  window.addEventListener('resize',resize);
  if(document.readyState==='complete')resize();else window.addEventListener('load',resize);
})();</script>
