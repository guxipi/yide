<!-- ============================================================
  翼德 · 线稿批注层(把这整段原样嵌进每张 mock 的 </body> 之前)
  约定:每个可批注的区域,给它加 class="yd-region"(可选 data-label="名字")。
  勾哥用法:**点某个区域 → 当场弹输入框写意见(边打边自动保存)**;点别处/Esc 收起。
           写完点「📋 复制反馈给翼德」→ 粘回 Claude 即可改。
  纯 vanilla JS,无依赖、无 overlay;批注存浏览器本地(同一文件重开还在)。
============================================================ -->
<style>
  #yd-bar{position:fixed;top:10px;right:10px;z-index:2147483600;display:flex;gap:6px;font:13px/1.4 system-ui,sans-serif}
  #yd-bar button{padding:6px 10px;border:1px solid #999;border-radius:6px;background:#fff;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .yd-region{cursor:pointer}
  .yd-region:hover{outline:2px dashed rgba(229,57,53,.6);outline-offset:1px}
  .yd-region.yd-has{outline:2px solid #e53935;outline-offset:1px}
  #yd-pop{position:absolute;z-index:2147483500;width:240px;background:#fff;border:1px solid #e53935;border-radius:8px;
    box-shadow:0 6px 20px rgba(0,0,0,.22);padding:10px;font:13px/1.4 system-ui,sans-serif;display:none}
  #yd-pop textarea{width:100%;height:62px;box-sizing:border-box;font:13px system-ui;resize:vertical}
  #yd-pop .row{display:flex;gap:6px;margin-top:8px;justify-content:space-between;align-items:center}
  #yd-pop .saved{color:#43a047;font-size:12px}
  #yd-pop button{padding:4px 10px;border:1px solid #bbb;border-radius:5px;background:#fafafa;cursor:pointer}
</style>
<div id="yd-bar"><button id="yd-copy">📋 复制反馈给翼德</button><button id="yd-clear">🗑 清空</button></div>
<div id="yd-pop">
  <div id="yd-pop-title" style="font-weight:bold;margin-bottom:6px;color:#e53935"></div>
  <textarea id="yd-pop-text" placeholder="这块要怎么改?(边打边自动保存)"></textarea>
  <div class="row"><span class="saved" id="yd-saved">已自动保存 ✓</span><span><button id="yd-del">删除</button> <button id="yd-close">关闭</button></span></div>
</div>
<script>(function(){
  var KEY='yd-notes:'+location.pathname, notes={};
  try{notes=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){}
  var regions=[].slice.call(document.querySelectorAll('.yd-region'));
  var pop=document.getElementById('yd-pop'),txt=document.getElementById('yd-pop-text'),title=document.getElementById('yd-pop-title'),saved=document.getElementById('yd-saved'),cur=-1;
  function labelOf(el,i){return el.getAttribute('data-label')||((el.textContent||'').trim().replace(/\s+/g,' ').slice(0,24))||('区域'+(i+1))}
  function persist(){try{localStorage.setItem(KEY,JSON.stringify(notes))}catch(e){}}
  function refresh(){regions.forEach(function(el,i){el.classList.toggle('yd-has',!!(notes[i]&&notes[i].note))})}
  function openPop(i){cur=i;var el=regions[i],r=el.getBoundingClientRect();title.textContent='区域 '+(i+1)+' · '+labelOf(el,i);
    txt.value=(notes[i]&&notes[i].note)||'';saved.style.visibility=txt.value?'visible':'hidden';
    pop.style.display='block';var left=window.scrollX+r.right+8,top=window.scrollY+r.top;
    if(left+250>document.documentElement.clientWidth+window.scrollX)left=window.scrollX+r.left-248;if(left<window.scrollX+4)left=window.scrollX+4;
    pop.style.left=left+'px';pop.style.top=top+'px';txt.focus()}
  function closePop(){pop.style.display='none';cur=-1}
  // 边打边自动保存
  txt.addEventListener('input',function(){if(cur<0)return;var v=txt.value.trim();if(v)notes[cur]={label:labelOf(regions[cur],cur),note:v};else delete notes[cur];persist();refresh();saved.style.visibility=v?'visible':'hidden'});
  regions.forEach(function(el,i){el.addEventListener('click',function(e){e.stopPropagation();openPop(i)})});
  pop.addEventListener('click',function(e){e.stopPropagation()});
  document.addEventListener('click',function(){if(pop.style.display==='block')closePop()});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePop()});
  document.getElementById('yd-del').onclick=function(){delete notes[cur];persist();refresh();closePop()};
  document.getElementById('yd-close').onclick=closePop;
  document.getElementById('yd-clear').onclick=function(){if(confirm('清空所有批注?')){notes={};persist();refresh();closePop()}};
  document.getElementById('yd-copy').onclick=function(){
    var ks=Object.keys(notes).filter(function(k){return notes[k]&&notes[k].note});
    if(!ks.length){alert('还没批注。点界面上任意区域(移上去会高亮)即可写意见,边打边自动保存。');return}
    var out='线稿批注反馈(共 '+ks.length+' 条,粘给翼德即可):\n'+ks.map(function(k){return '· ['+notes[k].label+'] — '+notes[k].note}).join('\n');
    function ok(){alert('已复制 '+ks.length+' 条批注,粘回 Claude 即可。')}
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(out).then(ok,function(){prompt('复制下面这段贴给翼德:',out)});
    else prompt('复制下面这段贴给翼德:',out);
  };
  refresh();
})();</script>
